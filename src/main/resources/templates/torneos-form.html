<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Registrar Torneo</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="p5-navbar">
  <div class="p5-navbar-inner">
    <a href="/" class="p5-brand">TORNEO<span>ESPORTS</span></a>
    <ul class="p5-nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/torneos" class="active">Torneos</a></li>
      <li><a href="/equipos">Equipos</a></li>
      <li><a href="/videojuegos">Videojuegos</a></li>
      <li><a href="/usuarios">Usuarios</a></li>
    </ul>
  </div>
</nav>

<header class="p5-page-header">
  <p class="p5-page-sub">Mantenimiento</p>
  <h1 class="p5-page-title">Registrar torneo</h1>
</header>

<div class="p5-container">

  <div class="p5-form-card">

    <form th:action="@{/torneos/guardar}"
          th:object="${torneo}"
          method="post">

        <div class="p5-field">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}">
        </div>

        <div class="p5-field">
            <label>Descripción</label>
            <input type="text" th:field="*{descripcion}">
        </div>

        <div class="p5-field">
            <label>Fecha inicio</label>
            <input type="date" th:field="*{fechaInicio}">
        </div>

        <div class="p5-field">
            <label>Fecha fin</label>
            <input type="date" th:field="*{fechaFin}">
        </div>

        <div class="p5-field">
            <label>Cupo máximo</label>
            <input type="number" th:field="*{cupoMaximo}">
        </div>

        <div class="p5-field">
            <label>Estado</label>
            <input type="text" th:field="*{estado}">
        </div>

        <div class="p5-field">
            <label>Videojuego</label>
            <select th:field="*{videojuego}">
                <option
                    th:each="v : ${listaVideojuegos}"
                    th:value="${v.idVideojuego}"
                    th:text="${v.nombre}">
                </option>
            </select>
        </div>

        <div class="p5-field">
            <label>Organizador</label>
            <select th:field="*{organizador}">
                <option
                    th:each="o : ${listaOrganizadores}"
                    th:value="${o.idUsuario}"
                    th:text="${o.nombres}">
                </option>
            </select>
        </div>

        <button type="submit" class="p5-btn">Guardar</button>

    </form>

  </div>

  <br>
  <a href="/torneos" class="p5-link-back">&larr; Volver al listado</a>

</div>

</body>
</html>
