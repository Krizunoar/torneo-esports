<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Equipos</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="p5-navbar">
  <div class="p5-navbar-inner">
    <a href="/" class="p5-brand">TORNEO<span>ESPORTS</span></a>
    <ul class="p5-nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/torneos">Torneos</a></li>
      <li><a href="/equipos" class="active">Equipos</a></li>
      <li><a href="/videojuegos">Videojuegos</a></li>
      <li><a href="/usuarios">Usuarios</a></li>
    </ul>
  </div>
</nav>

<header class="p5-page-header">
  <p class="p5-page-sub">Mantenimiento</p>
  <h1 class="p5-page-title">Listado de equipos</h1>
</header>

<div class="p5-container">

  <a href="/equipos/nuevo" class="p5-btn">+ Nuevo equipo</a>

  <br><br>

  <div class="p5-table-wrap">
    <table class="p5-table">

      <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Videojuego</th>
          <th>Capitán</th>
          <th>Acciones</th>
      </tr>

      <tr th:each="e : ${listaEquipos}">

          <td th:text="${e.idEquipo}"></td>
          <td th:text="${e.nombre}"></td>
          <td th:text="${e.videojuego.nombre}"></td>
          <td th:text="${e.capitan.nombres}"></td>

          <td>
              <a class="p5-btn-outline p5-btn" style="padding:6px 14px; font-size:11px;"
                 th:href="@{/equipos/{id}(id=${e.idEquipo})}">
                 Jugadores
              </a>
              <a class="p5-btn-outline p5-btn" style="padding:6px 14px; font-size:11px;"
                 th:href="@{/equipos/{id}/historial(id=${e.idEquipo})}">
                 Historial
              </a>
              <a class="p5-btn-danger p5-btn" style="padding:6px 14px; font-size:11px;"
                 th:href="@{/equipos/eliminar/{id}(id=${e.idEquipo})}">
                 Eliminar
              </a>
          </td>

      </tr>

    </table>
  </div>

  <br>
  <a href="/" class="p5-link-back">&larr; Volver al inicio</a>

</div>

</body>
</html>
