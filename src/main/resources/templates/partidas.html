<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Partidas del Torneo</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="p5-navbar">
  <div class="p5-navbar-inner">
    <a href="/" class="p5-brand">TORNEO<span>ESPORTS</span></a>
    <ul class="p5-nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/torneos" class="active">Torneos</a></li>
      <li><a href="/equipos">Equipos</a></li>
      <li><a href="/videojuegos">Videojuegos</a></li>
      <li><a href="/usuarios">Usuarios</a></li>
    </ul>
  </div>
</nav>

<header class="p5-page-header">
  <p class="p5-page-sub">Torneo</p>
  <h1 class="p5-page-title">Partidas: <span th:text="${torneo.nombre}"></span></h1>
</header>

<div class="p5-container">

  <div class="p5-table-wrap">
    <table class="p5-table">

      <tr>
          <th>ID</th>
          <th>Ronda</th>
          <th>Equipo 1</th>
          <th>Equipo 2</th>
          <th>Score</th>
          <th>Ganador</th>
          <th>Estado</th>
          <th>Registrar resultado</th>
      </tr>

      <tr th:each="p : ${listaPartidas}">
          <td th:text="${p.idPartida}"></td>
          <td th:text="${p.ronda}"></td>
          <td th:text="${p.equipo1.nombre}"></td>
          <td th:text="${p.equipo2.nombre}"></td>
          <td>
              <span th:text="${p.scoreEquipo1}"></span> - <span th:text="${p.scoreEquipo2}"></span>
          </td>
          <td th:text="${p.equipoGanador != null} ? ${p.equipoGanador.nombre} : 'Pendiente'"></td>
          <td>
              <span class="p5-badge"
                    th:classappend="${p.estado == 'FINALIZADA'} ? 'p5-badge-done' : 'p5-badge-pending'"
                    th:text="${p.estado}"></span>
          </td>
          <td>
              <form th:if="${p.estado == 'PENDIENTE'}"
                    th:action="@{/partidas/{id}/resultado(id=${p.idPartida})}"
                    method="post"
                    style="display:flex; gap:6px; align-items:center;">

                  <input type="number" name="scoreEquipo1" placeholder="S1" style="width:55px; padding:8px; background:var(--c-black); border:2px solid var(--c-grey-line); border-radius:6px; color:var(--c-white);" required>
                  <input type="number" name="scoreEquipo2" placeholder="S2" style="width:55px; padding:8px; background:var(--c-black); border:2px solid var(--c-grey-line); border-radius:6px; color:var(--c-white);" required>
                  <button type="submit" class="p5-btn" style="padding:8px 14px; font-size:11px;">Registrar</button>
              </form>
          </td>
      </tr>

    </table>
  </div>

  <div class="p5-bar"></div>

  <h2 class="p5-section-title">Crear partida nueva</h2>

  <div class="p5-form-card">

    <form th:action="@{/torneos/{id}/partidas/crear(id=${torneo.idTorneo})}"
          th:object="${nuevaPartida}"
          method="post">

        <div class="p5-field">
            <label>Ronda</label>
            <input type="text" th:field="*{ronda}" placeholder="Ej: Cuartos de final">
        </div>

        <div class="p5-field">
            <label>Equipo 1</label>
            <select th:field="*{equipo1}">
                <option
                    th:each="i : ${listaInscripciones}"
                    th:value="${i.equipo.idEquipo}"
                    th:text="${i.equipo.nombre}">
                </option>
            </select>
        </div>

        <div class="p5-field">
            <label>Equipo 2</label>
            <select th:field="*{equipo2}">
                <option
                    th:each="i : ${listaInscripciones}"
                    th:value="${i.equipo.idEquipo}"
                    th:text="${i.equipo.nombre}">
                </option>
            </select>
        </div>

        <button type="submit" class="p5-btn">Crear partida</button>

    </form>

  </div>

  <br>
  <a href="/torneos" class="p5-link-back">&larr; Volver al listado de torneos</a>

</div>

</body>
</html>
