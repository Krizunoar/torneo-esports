<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registrar Videojuego</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="p5-navbar">
  <div class="p5-navbar-inner">
    <a href="/" class="p5-brand">TORNEO<span>ESPORTS</span></a>
    <ul class="p5-nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/torneos">Torneos</a></li>
      <li><a href="/equipos">Equipos</a></li>
      <li><a href="/videojuegos" class="active">Videojuegos</a></li>
      <li><a href="/usuarios">Usuarios</a></li>
    </ul>
  </div>
</nav>

<header class="p5-page-header">
  <p class="p5-page-sub">Mantenimiento</p>
  <h1 class="p5-page-title">Registrar videojuego</h1>
</header>

<div class="p5-container">

  <div class="p5-form-card">

    <form th:action="@{/videojuegos/guardar}"
          th:object="${videojuego}"
          method="post">

        <input type="hidden" th:field="*{idVideojuego}">

        <div class="p5-field">
            <label>Nombre</label>
            <input type="text" th:field="*{nombre}">
        </div>

        <div class="p5-field">
            <label>Género</label>
            <input type="text" th:field="*{genero}">
        </div>

        <div class="p5-field">
            <label>Plataforma</label>
            <input type="text" th:field="*{plataforma}">
        </div>

        <div class="p5-field">
            <label>Desarrollador</label>
            <input type="text" th:field="*{desarrollador}">
        </div>

        <button type="submit" class="p5-btn">Guardar</button>

    </form>

  </div>

  <br>
  <a href="/videojuegos" class="p5-link-back">&larr; Volver</a>

</div>

</body>
</html>
