<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Videojuegos</title>
</head>
<body>

<h1>Listado de Videojuegos</h1>

<a href="/videojuegos/nuevo">
    Nuevo Videojuego
</a>

<br><br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Nombre</th>
    <th>Genero</th>
    <th>Plataforma</th>
	<th>Acciones</th>
</tr>

<tr th:each="v : ${listaVideojuegos}">

    <td th:text="${v.idVideojuego}"></td>

    <td th:text="${v.nombre}"></td>

    <td th:text="${v.genero}"></td>

    <td th:text="${v.plataforma}"></td>
	
	<td>

	<a th:href="@{/videojuegos/editar/{id}(id=${v.idVideojuego})}">
	Editar
	</a>

	|

	<a th:href="@{/videojuegos/eliminar/{id}(id=${v.idVideojuego})}">
	Eliminar
	</a>

	</td>
	
</tr>

</table>

<br>
<a href="/">Volver al inicio</a>


</body>
</html>
