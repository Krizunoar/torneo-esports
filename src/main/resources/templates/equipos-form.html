<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registrar Equipo</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="p5-navbar">
  <div class="p5-navbar-inner">
    <a href="/" class="p5-brand">TORNEO<span>ESPORTS</span></a>
    <ul class="p5-nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/torneos">Torneos</a></li>
      <li><a href="/equipos" class="active">Equipos</a></li>
      <li><a href="/videojuegos">Videojuegos</a></li>
      <li><a href="/usuarios">Usuarios</a></li>
    </ul>
  </div>
</nav>

<header class="p5-page-header">
  <p class="p5-page-sub">Mantenimiento</p>
  <h1 class="p5-page-title">Registrar equipo</h1>
</header>

<div class="p5-container">

  <div class="p5-form-card">

    <form th:action="@{/equipos/guardar}"
          th:object="${equipo}"
          method="post">

        <div class="p5-field">
            <label>Nombre del equipo</label>
            <input type="text" th:field="*{nombre}">
        </div>

        <div class="p5-field">
            <label>Videojuego</label>
            <select th:field="*{videojuego}">
                <option
                    th:each="v : ${listaVideojuegos}"
                    th:value="${v.idVideojuego}"
                    th:text="${v.nombre}">
                </option>
            </select>
        </div>

        <div class="p5-field">
            <label>Capitán</label>
            <select th:field="*{capitan}">
                <option
                    th:each="u : ${listaUsuarios}"
                    th:value="${u.idUsuario}"
                    th:text="${u.nombres}">
                </option>
            </select>
        </div>

        <button type="submit" class="p5-btn">Guardar</button>

    </form>

  </div>

  <br>
  <a href="/equipos" class="p5-link-back">&larr; Volver</a>

</div>

</body>
</html>
